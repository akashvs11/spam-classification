<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Spam Detection System</title>
  <link href='https://fonts.googleapis.com/css?family=Pacifico' rel='stylesheet' type='text/css'>
  <link href='https://fonts.googleapis.com/css?family=Arimo' rel='stylesheet' type='text/css'>
  <link href='https://fonts.googleapis.com/css?family=Hind:300' rel='stylesheet' type='text/css'>
  <link href='https://fonts.googleapis.com/css?family=Open+Sans+Condensed:300' rel='stylesheet' type='text/css'>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    /* CSS for centering the content */
    body {
      background-image: url("{{ url_for('static', filename='background.gif') }}"); /* Replace "background.gif" with your image path */
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      font-family: 'Arimo', sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh; /* Set the height of the body to fill the entire viewport */
      overflow: hidden; /* Hide overflow content */
    }
    .login {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      background-color: rgba(255, 255, 255, 0.8); /* Transparent white background */
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="login">
    <h1>Spam⚠️Classification 📧</h1>
    <form action="{{ url_for('index')}}" method="POST">
      <textarea name="message" rows="6" cols="50" required="required"></textarea>
      <br><br>
      <button type="submit" class="btn btn-primary btn-block btn-large">Predict</button>
      <div class="results">
        {% if prediction == 1 %}
          <h2 style="color:red;">Looking Spam⚠️, Be safe</h2>
        {% elif prediction == 0 %}
          <h2 style="color:green;"><b>Not a Spam💚</b></h2>
        {% endif %}
      </div>
    </form>
    <br>
    <a href="{{ url_for('home') }}">Back to Home</a>
  </div>
</body>
</html>
