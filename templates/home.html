<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Spam Classification{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .container {
            /* Set background image */
            background-image: url('{{ url_for('static', filename='images - Copy.jpg') }}'); 
            background-size: cover; /* Adjust background size to cover the entire container */
            background-repeat: no-repeat;
            background-position: center right; /* Change to center right */
            display: flex; /* Use flexbox for layout */
            justify-content: center; /* Center content horizontally */
            align-items: center; /* Center content vertically */
            height: 100vh; /* Make container full height */
        }

        .sidebar {
            flex: 0 0 250px; /* Set sidebar to a fixed width of 250px */
            background-color: #FFC0CB; /* Change background color to pink */
            color: white; /* Set text color in sidebar */
            padding: 20px; /* Add padding to sidebar */
            display: flex; /* Use flexbox for sidebar content */
            flex-direction: column; /* Arrange sidebar content vertically */
            justify-content: center; /* Center content vertically */
        }

        .sidebar-links {
            list-style-type: none; /* Remove default list style */
            padding: 0; /* Remove default padding */
            text-align: center; /* Center text horizontally */
        }

        .sidebar-links li {
            margin-bottom: 10px; /* Add some bottom margin between list items */
        }

        .content {
            padding: 20px; /* Add padding to content */
            color: white; /* Set text color */
            text-align: center; /* Center text horizontally */
        }

        .title-heading {
            color: red; /* Change color to red */
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <ul class="sidebar-links">
                <li><a href="/">Home</a></li>
                <li><a href="/index">Index</a></li>
            </ul>
        </div>
        <div class="content">
            <h1 class="title-heading">Welcome to Spam Classification Project</h1>
            <!-- Replace 'Your Title Heading Here' with your desired title -->
            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
